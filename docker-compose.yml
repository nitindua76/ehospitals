services:
  mongodb:
    image: mongo:7
    container_name: hospital_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017" # Exposed for local debugging/tools
    volumes:
      - mongo_data:/data/db
    networks:
      - hospital_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hospital_backend
    restart: unless-stopped
    ports:
      - "5500:5000"
    env_file:
      - .env
    depends_on:
      - mongodb
    networks:
      - hospital_network
    command: sh -c "node src/seed.js && node src/index.js"

  hospital-portal:
    build:
      context: ./hospital-portal
      dockerfile: Dockerfile
    container_name: hospital_portal
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - hospital_network

  admin-dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    container_name: hospital_admin
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - hospital_network

volumes:
  mongo_data:


networks:
  hospital_network:
    driver: bridge
